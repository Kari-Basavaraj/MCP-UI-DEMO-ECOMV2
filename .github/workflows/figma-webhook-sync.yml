# ============================================================================
# Figma Webhook → Auto-Sync (Production)
# ============================================================================
# Fully automated: Figma save → webhook → GitHub dispatch → this workflow
#   → pull tokens → generate CSS → rebuild widgets → PR → auto-merge
#
# Zero manual steps. Concurrency-safe. Self-healing.
# ============================================================================

name: Figma Webhook Sync

on:
  repository_dispatch:
    types:
      - figma_library_publish

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual test'
        type: string
      auto_merge:
        description: 'Auto-merge the PR if checks pass'
        required: false
        default: true
        type: boolean

# Prevent concurrent sync runs — latest wins
concurrency:
  group: figma-webhook-sync
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  webhook-sync:
    name: Pull → Generate → Build → PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
      FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
      FIGMA_REGION: ${{ secrets.FIGMA_REGION }}

    steps:
      - name: Log trigger context
        run: |
          echo "═══════════════════════════════════════════"
          echo "  Figma Webhook Sync Triggered"
          echo "═══════════════════════════════════════════"
          echo "Event type: ${{ github.event.action }}"
          echo "Triggered by: ${{ github.event.client_payload.triggered_by || inputs.reason || 'webhook' }}"
          echo "File key: ${{ github.event.client_payload.file_key || env.FIGMA_FILE_KEY }}"
          echo "Timestamp: ${{ github.event.client_payload.timestamp || 'N/A' }}"
          echo "Webhook event: ${{ github.event.client_payload.webhook_event || 'N/A' }}"
          echo "═══════════════════════════════════════════"

      - name: Validate file key matches
        run: |
          WEBHOOK_FILE_KEY="${{ github.event.client_payload.file_key }}"
          if [ -n "$WEBHOOK_FILE_KEY" ] && [ "$WEBHOOK_FILE_KEY" != "$FIGMA_FILE_KEY" ]; then
            echo "::warning::Webhook file_key ($WEBHOOK_FILE_KEY) doesn't match configured FIGMA_FILE_KEY ($FIGMA_FILE_KEY). Skipping."
            exit 0
          fi
          echo "File key validated (or no file_key in payload — proceeding)."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp-server/package-lock.json
            web-client/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix mcp-server ci
          npm --prefix web-client ci

      - name: Check Figma secrets
        run: |
          if [ -z "$FIGMA_ACCESS_TOKEN" ]; then
            echo "::error::FIGMA_ACCESS_TOKEN secret is not set."
            exit 1
          fi
          echo "✓ Figma secrets configured"

      # ── Full sync pipeline ──────────────────────────────────────
      - name: Pull variables from Figma
        run: npm run figma:pull:variables

      - name: Normalize variables
        run: npm run figma:normalize:variables

      - name: Generate CSS token files
        run: npm run figma:generate:tokens

      - name: Sync tokens to web-client
        run: npm run tokens:sync

      - name: Rebuild all widgets
        run: npm --prefix mcp-server run build

      - name: Copy widgets to web-client/public
        run: |
          mkdir -p web-client/public/widgets
          cp mcp-server/dist/widgets/*.html web-client/public/widgets/
          echo "✓ Copied $(ls web-client/public/widgets/*.html | wc -l | tr -d ' ') widgets to web-client/public/widgets/"

      - name: Verify pipeline
        run: npm run figma:verify

      # ── Commit & push directly to main ─────────────────────────
      # Uses PAT (not GITHUB_TOKEN) so the push triggers Vercel deploy
      - name: Commit and push changes
        id: push
        env:
          GH_PAT: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
          git add -A
          CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
          echo "changed_files=$CHANGED" >> "$GITHUB_OUTPUT"

          if [ "$CHANGED" -eq 0 ]; then
            echo "No token changes detected — Figma variables already match code."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Token changes detected in $CHANGED files:"
            git diff --cached --stat
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            TRIGGER="${{ github.event.action || 'manual' }}"
            FKEY="${{ github.event.client_payload.file_key || 'N/A' }}"
            RID="${{ github.event.client_payload.request_id || 'N/A' }}"
            git commit -m "chore(figma): auto-sync variables from webhook" \
              -m "Triggered by: ${TRIGGER}" \
              -m "File key: ${FKEY}" \
              -m "Request ID: ${RID}" \
              -m "Pipeline: pull > normalize > generate > sync > build > verify"

            # Pull with rebase to handle any concurrent pushes
            if ! git pull --rebase origin main 2>&1; then
              echo "::warning::Rebase conflict — checking if changes were already pushed by concurrent run"
              git rebase --abort 2>/dev/null || true
              git reset --hard HEAD~1 2>/dev/null || true
              git fetch origin main
              git reset --hard origin/main

              # Re-run the exact same pipeline output check
              git add -A
              RECHECK=$(git diff --cached --name-only | wc -l | tr -d ' ')
              if [ "$RECHECK" -eq 0 ]; then
                echo "✅ Changes already on main from a concurrent run — nothing to push."
                echo "has_changes=false" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "Token changes still differ after fetching origin — committing again"
                git commit -m "chore(figma): auto-sync variables from webhook (retry)" \
                  -m "Triggered by: ${TRIGGER}" \
                  -m "File key: ${FKEY}" \
                  -m "Request ID: ${RID}"
              fi
            fi

            git push origin main
            echo "Pushed token changes directly to main — Vercel will auto-deploy."
          fi

      - name: Trigger Vercel deploy
        if: steps.push.outputs.has_changes == 'true'
        run: |
          echo "Triggering Vercel production deploy via deploy hook..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
            echo "✅ Vercel deploy triggered (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Vercel deploy hook returned HTTP $HTTP_CODE — deploy may not have triggered"
          fi

      - name: No changes summary
        if: steps.push.outputs.has_changes == 'false'
        run: echo "✅ Pipeline ran successfully. Figma tokens already match code — no push needed."

      # ── Artifacts ──────────────────────────────────────────────
      - name: Upload sync artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figma-webhook-sync-artifacts
          path: |
            tokens/figma/variables.raw.json
            tokens/figma/variables.normalized.json
            docs/code reports/figma-sync-verification.json
            docs/code reports/figma-sync-verification.md
          if-no-files-found: ignore
          retention-days: 14
